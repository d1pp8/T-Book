services:
  db:
    image: postgres:17-alpine
    container_name: tbook_postgres
    env_file:
      - .env.docker
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5


  web:
    build:
      context: .
    container_name: tbook_web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    expose:
      - "8000"
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media


  nginx:
    image: nginx:alpine
    container_name: tbook_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
  static_volume:
  media_volume: