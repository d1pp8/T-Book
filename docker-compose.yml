services:
  db:
    image: postgres:17-alpine
    container_name: tbook_postgres
    env_file:
      - .env.docker
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5


  web:
    build:
      context: .
    container_name: tbook_web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    expose:
      - "8000"
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  frontend:
    build:
      context: ./tbook-frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: tbook_frontend
    volumes:
      - frontend_volume:/frontend


  nginx:
    image: nginx:alpine
    container_name: tbook_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - frontend_volume:/app/frontend
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

    depends_on:
      web:
        condition: service_started
      frontend:
        condition: service_started

  certbot:
    image: certbot/certbot
    container_name: tbook_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  postgres_data:
  static_volume:
  media_volume:
  frontend_volume:
  certbot_www:
  certbot_conf: