events {}

http {

    upstream django {
        server web:8000;
    }

    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json map;
        image/svg+xml                         svg svgz;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/webp                            webp;
        font/woff2                            woff2;
        font/woff                             woff;
    }
    default_type application/octet-stream;

    server {
        listen 80;
        server_name t-book.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }


    server {
        listen 443 ssl http2;
        server_name t-book.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/t-book.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/t-book.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;


        location ~ ^/(api|admin|schema)(/|$) {
            proxy_pass http://django;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_http_version 1.1;
            proxy_redirect off;
        }


        location /static/ {
            alias /app/staticfiles/;
        }


        location /media/ {
            alias /app/media/;
        }

        # ---- React SPA (built by the frontend service into this volume) ----
        root /app/frontend;
        index index.html;

        location /assets/ {
            expires 30d;
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
